<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark rounded square background -->
  <rect width="32" height="32" rx="7.5" fill="#0C0C0F"/>
  <!-- Subtle violet border -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="7" fill="none" stroke="#8B7CF6" stroke-opacity="0.28"/>
  <!-- Inner glow -->
  <ellipse cx="16" cy="15" rx="13" ry="11" fill="#8B7CF6" fill-opacity="0.08"/>
  <!-- M — left vert + two inner diagonals + right vert -->
  <polyline
    points="4.5,26 4.5,6.5 10.5,16 16.5,6.5 16.5,26"
    stroke="url(#g)"
    stroke-width="2.3"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- H — left vert -->
  <line x1="19.5" y1="6.5" x2="19.5" y2="26" stroke="url(#g)" stroke-width="2.3" stroke-linecap="round"/>
  <!-- H — right vert -->
  <line x1="27.5" y1="6.5" x2="27.5" y2="26" stroke="url(#g)" stroke-width="2.3" stroke-linecap="round"/>
  <!-- H — crossbar -->
  <line x1="19.5" y1="16.25" x2="27.5" y2="16.25" stroke="url(#g)" stroke-width="2.3" stroke-linecap="round"/>
  <defs>
    <linearGradient id="g" x1="4.5" y1="6.5" x2="27.5" y2="26" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C4B5FD"/>
      <stop offset="0.5" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#818CF8"/>
    </linearGradient>
  </defs>
</svg>
